<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐼 萌萌熊貓 5x5 拼圖挑戰 | Cute Panda Jigsaw Challenge</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Background glow spots -->
    <div class="glow-spot glow-1"></div>
    <div class="glow-spot glow-2"></div>

    <div class="app-container">
        <!-- Header -->
        <header>
            <div class="brand-section">
                <div class="logo-icon">
                    <i class="fa-solid fa-paw"></i>
                </div>
                <div class="title-group">
                    <h1>萌萌熊貓 5x5 拼圖挑戰</h1>
                    <p>挑戰您的眼力極限！還原最軟萌可愛的大熊貓經典瞬間 🐼</p>
                </div>
            </div>
            <a href="../index-zh.html" class="back-home-btn">
                <i class="fa-solid fa-house"></i> 回作品集首頁
            </a>
        </header>

        <!-- Main Dashboard -->
        <main class="dashboard">
            <!-- Left Side: Control panel -->
            <section class="control-panel">
                <div class="section-title">
                    <i class="fa-solid fa-sliders"></i>
                    <span>熊貓拼圖主控台</span>
                </div>

                <!-- 1. Image Selector -->
                <div class="control-group">
                    <label class="group-label"><i class="fa-solid fa-image"></i> 選擇熊貓照片：</label>
                    <div class="image-grid" id="image-selector">
                        <!-- Loaded dynamically via app.js -->
                    </div>
                    <div class="custom-upload-wrapper">
                        <label for="file-upload" class="upload-btn">
                            <i class="fa-solid fa-upload"></i> 上傳自己的照片
                        </label>
                        <input type="file" id="file-upload" accept="image/*" style="display: none;">
                    </div>
                </div>

                <!-- 2. Difficulty Selector -->
                <div class="control-group">
                    <label class="group-label"><i class="fa-solid fa-border-all"></i> 選擇分割難度：</label>
                    <div class="difficulty-buttons">
                        <button class="diff-btn" data-grid="3">3 x 3 (簡單)</button>
                        <button class="diff-btn" data-grid="4">4 x 4 (中等)</button>
                        <button class="diff-btn active" data-grid="5">5 x 5 (推薦/高難)</button>
                    </div>
                </div>

                <!-- 3. Statistics -->
                <div class="stats-card">
                    <div class="stat-item">
                        <span class="stat-title">已用時間 (Time)</span>
                        <span class="stat-value" id="game-timer">00:00</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-title">拖曳步數 (Moves)</span>
                        <span class="stat-value" id="game-moves">0</span>
                    </div>
                </div>

                <!-- 4. Game Controls -->
                <div class="action-buttons">
                    <button class="btn-primary" id="btn-start" onclick="startGame()">
                        <i class="fa-solid fa-play"></i> 重新打亂開始
                    </button>
                    <button class="btn-secondary" id="btn-preview">
                        <i class="fa-solid fa-eye"></i> 顯示完整原圖
                    </button>
                </div>
            </section>

            <!-- Right Side: Game Playground -->
            <section class="game-playground">
                <!-- Board: slots to drop pieces -->
                <div class="board-area">
                    <div class="puzzle-board" id="puzzle-board">
                        <!-- Grid cells will be generated dynamically -->
                    </div>
                    <!-- Preview Image Overlay -->
                    <div class="preview-overlay" id="preview-overlay">
                        <img id="preview-img" src="" alt="拼圖原圖預覽">
                        <div class="preview-text">預覽中...放開按鈕以返回</div>
                    </div>
                    <!-- Empty board alert before start -->
                    <div class="board-placeholder" id="board-placeholder">
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                        <p>請點擊「重新打亂開始」開啟挑戰！</p>
                    </div>
                </div>

                <!-- Pool: pieces to drag -->
                <div class="pool-area">
                    <div class="pool-header">
                        <h3><i class="fa-solid fa-box-open"></i> 拼圖碎片放置區 (拖曳至上方對應網格)</h3>
                    </div>
                    <div class="pieces-pool" id="pieces-pool">
                        <!-- Scrambled pieces will be placed here -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Victory Modal Overlay -->
    <div class="modal-overlay" id="victory-modal">
        <div class="victory-card">
            <div class="victory-icon">
                <i class="fa-solid fa-trophy"></i>
            </div>
            <h2>熊貓達人！🎉</h2>
            <p>您成功還原了 5x5 熊貓拼圖，速度驚人！</p>
            <div class="victory-stats">
                <div class="v-stat">
                    <span class="v-title">總花費時間</span>
                    <span class="v-val" id="v-time">00:00</span>
                </div>
                <div class="v-stat">
                    <span class="v-title">總移動步數</span>
                    <span class="v-val" id="v-moves">0</span>
                </div>
            </div>
            <button class="btn-victory" onclick="closeVictoryModal()">
                <i class="fa-solid fa-arrow-rotate-right"></i> 再挑戰一次！
            </button>
        </div>
    </div>

    <!-- Canvas for confetti effects -->
    <canvas id="confetti-canvas" style="display: none;"></canvas>

    <script src="app.js"></script>
</body>
</html>
